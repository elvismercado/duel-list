server {
  listen 80;
  server_name localhost;

  charset utf-8;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text-y assets.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    image/svg+xml;

  # The HTML shell must NOT be cached, otherwise PWA users get stuck on stale builds.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  # The service worker MUST always be revalidated, otherwise updates stall.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
    try_files $uri =404;
  }

  # Same for the registration shim and the web manifest.
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache" always;
    types { application/manifest+json webmanifest; }
    default_type application/manifest+json;
    try_files $uri =404;
  }

  # Hashed assets emitted by Vite under /assets/* are content-addressed: long-cache them.
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # SPA fallback: anything that isn't a real file falls through to the shell.
  location / {
    try_files $uri $uri/ /index.html;
  }

  error_log  /var/log/nginx/duel-list-error.log;
  access_log /var/log/nginx/duel-list-access.log;
}
